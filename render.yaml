services:
  - type: web
    name: stock-analyzer
    runtime: python
    buildCommand: pip install -r requirements.txt
    # workerは1本固定（app.py のAPSchedulerがプロセス内で起動するため、
    # 複数workerにするとcronが多重実行される）。並行性はスレッドで確保する。
    # --timeout は ANALYZE_TIMEOUT(60秒) を上回る値にする（既定30秒だと分析中に502になる）
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --worker-class gthread --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Database (SQLAlchemy用)
      - key: DB_SERVER
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # App
      - key: APP_SECRET_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      # OpenAI
      - key: OPENAI_API_KEY
        sync: false
      # DIFY (オプション)
      - key: DIFY_API_KEY
        sync: false
